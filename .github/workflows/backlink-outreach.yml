name: Backlink Outreach

on:
  schedule:
    # Every Monday at 9am IST = 03:30 UTC Monday
    - cron: '30 3 * * 1'
  workflow_dispatch:

concurrency:
  group: backlink-outreach
  cancel-in-progress: false

jobs:
  outreach:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run outreach pipeline
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:           ${{ secrets.RESEND_API_KEY }}
          GOOGLE_SEARCH_API_KEY:    ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_ENGINE_ID:  ${{ secrets.GOOGLE_SEARCH_ENGINE_ID }}
        run: node scripts/backlink-outreach.js

      - name: Commit outreach log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/outreach-log.json
          git diff --staged --quiet \
            && echo "No outreach log changes." \
            || (git commit -m "logs: backlink outreach run $(date +'%Y-%m-%d') [auto]" && git pull --rebase origin main && git push)
