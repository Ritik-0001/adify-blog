name: Publish Next Queued Post

on:
  # Trigger manually from the GitHub Actions UI
  workflow_dispatch:

  # Trigger via GitHub API — this is what n8n calls
  # POST https://api.github.com/repos/{owner}/{repo}/dispatches
  # Body: { "event_type": "publish-post" }
  repository_dispatch:
    types: [publish-post]

  # Cron schedule — 8x per day (UTC times, IST = UTC+5:30)
  # 02:30 UTC = 08:00 IST  |  04:30 UTC = 10:00 IST
  # 06:30 UTC = 12:00 IST  |  08:30 UTC = 14:00 IST
  # 10:30 UTC = 16:00 IST  |  12:30 UTC = 18:00 IST
  # 14:30 UTC = 20:00 IST  |  16:30 UTC = 22:00 IST
  schedule:
    - cron: '30 2 * * *'
    - cron: '30 4 * * *'
    - cron: '30 6 * * *'
    - cron: '30 8 * * *'
    - cron: '30 10 * * *'
    - cron: '30 12 * * *'
    - cron: '30 14 * * *'
    - cron: '30 16 * * *'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit + push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Move oldest queued post to /posts
        run: node scripts/publish-next.js

      - name: Commit and push (if a post was published)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --staged --quiet \
            && echo "No post was moved — queue may be empty." \
            || (git commit -m "publish: move next queued post to /posts" && git push)
